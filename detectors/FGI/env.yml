name: fgi
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10

  # Core scientific stack
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib

  # PyTorch (modern CUDA support)
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Utils
  - pip
  - pip:
      - gradio==4.*
      - fastapi
      - uvicorn
      - huggingface-hub
      - timm
      - einops
      - opencv-python
      - librosa
      - ray
      - tensorboard
      - tqdm
      - pydantic
      - safetensors
      - transformers
      - accelerate
      - datasets
